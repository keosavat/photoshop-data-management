<!-- components/topbar.html — top bar + Language Switcher (STEP 7). -->
<header class="topbar">
  <strong data-i18n="app.title"></strong>
  <span style="flex:1"></span>
  <select id="langSwitcher" class="input" onchange="switchLanguage(this.value)" aria-label="Language">
    <option value="lo">ລາວ</option>
    <option value="th">ไทย</option>
    <option value="en">English</option>
  </select>
  <button class="btn btn-ghost" data-i18n="auth.logout" onclick="doLogout()"></button>
</header>

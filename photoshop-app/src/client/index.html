  <script>
    // ---------- Session bootstrap: login() → token + csrf (STEP 5/9) ----------
    window.__token = null; window.__csrf = null;
    function bootstrapSession() {
      google.script.run
        .withSuccessHandler(function (s) {
          window.__token = s.token; window.__csrf = s.csrf;
          var el = document.getElementById('welcomeMsg');
          if (el && typeof t === 'function') el.textContent = t('welcome', { name: (s.user && s.user.name) || 'User' });
        })
        .withFailureHandler(function () {})
        .login();
    }

    // ---------- Logout: ລ້າງ session + ສະແດງໜ້າຢືນຢັນ ----------
    function doLogout() {
      try { google.script.run.logout(window.__token); } catch (e) {}
      window.__token = null; window.__csrf = null;
      document.body.innerHTML =
        '<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:sans-serif;gap:16px;background:#f5f7fa">' +
          '<div style="font-size:48px">👋</div>' +
          '<h2 style="margin:0;color:#1F4E79">ອອກຈາກລະບົບແລ້ວ</h2>' +
          '<p style="color:#666;margin:0">ຂອບໃຈ. ກົດປຸ່ມລຸ່ມນີ້ເພື່ອເຂົ້າສູ່ລະບົບໃໝ່.</p>' +
          '<button onclick="location.reload()" style="background:#1F4E79;color:#fff;border:none;border-radius:8px;padding:12px 28px;font-size:15px;cursor:pointer">ເຂົ້າສູ່ລະບົບໃໝ່</button>' +
          '<a href="https://accounts.google.com/Logout" target="_blank" style="color:#888;font-size:13px">ອອກຈາກ Google ທັງໝົດ (ທຸກບັນຊີ)</a>' +
        '</div>';
    }

    // ---------- tiny hash router: dashboard | photos ----------
    function route() {
      var h = (location.hash || '#dashboard').replace('#', '');
      var views = { dashboard: 'dashboardView', orders: 'ordersView', photos: 'photosView', documents: 'documentsView', search: 'searchView', reports: 'reportsView', settings: 'settingsView' };
      Object.keys(views).forEach(function (k) {
        var el = document.getElementById(views[k]); if (el) el.hidden = (k !== h);
      });
      if (!views[h]) document.getElementById('dashboardView').hidden = false;  // fallback
      document.querySelectorAll('.sidebar a').forEach(function (a) {
        a.classList.toggle('active', a.getAttribute('data-nav') === h);
      });
      if (h === 'orders' && typeof initOrders === 'function') initOrders();
      if (h === 'photos' && typeof initPhotos === 'function') initPhotos();
      if (h === 'documents' && typeof initDocuments === 'function') initDocuments();
      if (h === 'search' && typeof initSearch === 'function') initSearch();
      if (h === 'reports' && typeof initReports === 'function') initReports();
      if (h === 'settings' && typeof initSettings === 'function') initSettings();
    }

    document.addEventListener('DOMContentLoaded', function () {
      bootstrapSession();
      window.addEventListener('hashchange', route);
      // sidebar nav: ຫ້າມ <a href="#..."> navigate _top (base target=_top) — ໃຊ້ hash ພາຍໃນ
      document.querySelectorAll('.sidebar a').forEach(function (a) {
        a.addEventListener('click', function (e) {
          e.preventDefault();
          location.hash = a.getAttribute('data-nav') || 'dashboard';
        });
      });
      setTimeout(route, 300);
    });
  </script>

<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Design System Preview — Photo Shop</title>
<style>
:root{
  --color-primary:#1F4E79;--color-primary-600:#163A5A;--color-accent:#2E75B6;
  --color-bg:#FFFFFF;--color-surface:#F7F9FC;--color-border:#D9E1EC;--color-text:#1A2530;--color-muted:#5B6B7B;
  --color-success:#2E7D32;--color-warning:#ED6C02;--color-danger:#C62828;--color-info:#0277BD;
  --font-sans:'Noto Sans Lao','Leelawadee UI','Segoe UI',system-ui,sans-serif;--font-mono:Consolas,monospace;
  --fs-xs:12px;--fs-sm:13px;--fs-base:15px;--fs-lg:18px;--fs-xl:22px;--fs-2xl:28px;--lh-base:1.6;
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-6:24px;--space-8:32px;
  --radius-sm:4px;--radius-md:8px;--radius-lg:12px;--radius-pill:999px;
  --shadow-sm:0 1px 2px rgba(16,36,58,.08);--shadow-md:0 4px 12px rgba(16,36,58,.12);--shadow-lg:0 10px 30px rgba(16,36,58,.18);
  --z-modal:1050;--sidebar-w:240px;--topbar-h:56px;
}
[data-theme="dark"]{--color-bg:#0F1720;--color-surface:#16212E;--color-border:#263443;--color-text:#E6EDF3;--color-muted:#93A4B5;}
*{box-sizing:border-box}html,body{margin:0}body{font-family:var(--font-sans);font-size:var(--fs-base);line-height:var(--lh-base);color:var(--color-text);background:var(--color-surface)}
:focus-visible{outline:2px solid var(--color-accent);outline-offset:2px}
.app{display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:var(--topbar-h) 1fr;min-height:100vh}
.topbar{grid-column:1/-1;display:flex;align-items:center;gap:var(--space-4);height:var(--topbar-h);padding:0 var(--space-4);background:var(--color-primary);color:#fff;position:sticky;top:0}
.sidebar{background:var(--color-bg);border-right:1px solid var(--color-border);padding:var(--space-4)}
.content{padding:var(--space-6);overflow:auto}
.sidebar a{display:block;padding:var(--space-2) var(--space-3);border-radius:var(--radius-md);color:var(--color-text);text-decoration:none}
.sidebar a:hover,.sidebar a.active{background:var(--color-surface);color:var(--color-primary)}
.btn{display:inline-flex;align-items:center;gap:var(--space-2);font:inherit;cursor:pointer;padding:var(--space-2) var(--space-4);border-radius:var(--radius-md);border:1px solid transparent}
.btn-primary{background:var(--color-primary);color:#fff}.btn-primary:hover{background:var(--color-primary-600)}
.btn-ghost{background:transparent;border-color:var(--color-border);color:var(--color-text)}.btn-danger{background:var(--color-danger);color:#fff}
.card{background:var(--color-bg);border:1px solid var(--color-border);border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);padding:var(--space-6)}
.card+.card{margin-top:var(--space-4)}
.field{display:flex;flex-direction:column;gap:var(--space-1);margin-bottom:var(--space-4)}
.field label{font-size:var(--fs-sm);color:var(--color-muted)}
.input,select{font:inherit;padding:var(--space-2) var(--space-3);border:1px solid var(--color-border);border-radius:var(--radius-md);background:var(--color-bg);color:var(--color-text)}
.table{width:100%;border-collapse:collapse}.table th{background:var(--color-primary);color:#fff;text-align:left;padding:var(--space-2) var(--space-3)}
.table td{padding:var(--space-2) var(--space-3);border-bottom:1px solid var(--color-border)}.table tr:hover td{background:var(--color-surface)}
.badge{display:inline-block;padding:2px var(--space-2);border-radius:var(--radius-pill);font-size:var(--fs-xs);color:#fff}
.badge-new{background:var(--color-muted)}.badge-printing{background:var(--color-warning)}.badge-completed{background:var(--color-success)}.badge-info{background:var(--color-info)}
.alert{padding:var(--space-3) var(--space-4);border-radius:var(--radius-md);border-left:4px solid;margin-bottom:var(--space-4)}
.alert-success{border-color:var(--color-success);background:#E8F5E9}.alert-warning{border-color:var(--color-warning);background:#FFF3E0}.alert-danger{border-color:var(--color-danger);background:#FFEBEE}
.tabs{display:flex;gap:var(--space-2);border-bottom:1px solid var(--color-border);margin-bottom:var(--space-4)}
.tabs button{background:none;border:none;padding:var(--space-2) var(--space-4);cursor:pointer;color:var(--color-muted);border-bottom:2px solid transparent}.tabs button.active{color:var(--color-primary);border-color:var(--color-primary)}
@media(max-width:1024px){:root{--sidebar-w:200px}}
@media(max-width:640px){.app{grid-template-columns:1fr;grid-template-rows:var(--topbar-h) auto 1fr}.sidebar{border-right:none;border-bottom:1px solid var(--color-border)}.content{padding:var(--space-4)}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <strong>ລະບົບຄຸ້ມຄອງຂໍ້ມູນ ແລະຮູບພາບ</strong>
    <span style="flex:1"></span>
    <select class="input"><option>ລາວ</option><option>ไทย</option><option>English</option></select>
    <button class="btn btn-ghost" onclick="document.body.toggleAttribute('data-theme')&&0;document.body.setAttribute('data-theme',document.body.getAttribute('data-theme')==='dark'?'':'dark')">Theme</button>
  </header>
  <nav class="sidebar">
    <a class="active" href="#">ໜ້າຫຼັກ</a><a href="#">ຮູບພາບ</a><a href="#">ອໍເດີ</a>
    <a href="#">ເອກະສານ</a><a href="#">ຄົ້ນຫາ</a><a href="#">ລາຍງານ</a><a href="#">ຕັ້ງຄ່າ</a>
  </nav>
  <main class="content">
    <div class="card">
      <h2>Design System Preview</h2>
      <p>ຍິນດີຕ້ອນຮັບ, User</p>
      <div class="tabs"><button class="active">ໜ້າຫຼັກ</button><button>ຮູບພາບ</button></div>
      <p><button class="btn btn-primary">ອັບໂຫຼດ</button> <button class="btn btn-ghost">ຄົ້ນຫາ</button> <button class="btn btn-danger">ລຶບ</button></p>
      <p>
        <span class="badge badge-new">ໃໝ່</span>
        <span class="badge badge-printing">ກຳລັງພິມ</span>
        <span class="badge badge-completed">ສຳເລັດ</span>
        <span class="badge badge-info">Info</span>
      </p>
    </div>
    <div class="card">
      <div class="alert alert-success">ບັນທຶກສຳເລັດ</div>
      <div class="alert alert-warning">ພື້ນທີ່ Drive ໃກ້ເຕັມ</div>
      <div class="alert alert-danger">ອັບໂຫຼດບໍ່ສຳເລັດ</div>
      <div class="field"><label>Customer Code</label><input class="input" placeholder="CUS-000001"></div>
      <table class="table">
        <thead><tr><th>OrderID</th><th>Customer</th><th>Status</th></tr></thead>
        <tbody>
          <tr><td>ORD-000001</td><td>CUS-000001</td><td><span class="badge badge-printing">ກຳລັງພິມ</span></td></tr>
          <tr><td>ORD-000002</td><td>CUS-000002</td><td><span class="badge badge-completed">ສຳເລັດ</span></td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>
</body>
</html>

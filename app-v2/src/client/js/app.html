<script>
/* app.html — client bootstrap: api() wrapper (google.script.run), theme, view router. */
const DAMS = {
  call(fn, ...args){
    return new Promise((resolve, reject)=>{
      google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[fn](...args);
    });
  },
  /* Open a URL in a new tab (works inside the Apps Script sandbox iframe). */
  open(url){
    var a = document.createElement('a');
    a.href = url; a.target = '_blank'; a.rel = 'noopener';
    document.body.appendChild(a); a.click(); a.remove();
  },
  toast(msg, err){
    var t = document.createElement('div');
    t.textContent = msg;
    t.style.cssText = 'position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:9999;'+
      'padding:11px 18px;border-radius:12px;font-size:.85rem;color:#fff;box-shadow:var(--shadow);'+
      'background:'+(err?'#c0392b':'#2d7d46');
    document.body.appendChild(t);
    setTimeout(function(){ t.style.transition='opacity .4s'; t.style.opacity='0'; setTimeout(function(){t.remove();},400); }, 2600);
  },
  /* Styled centered confirm dialog → Promise<boolean>. */
  confirm(message, opts){
    opts = opts || {};
    return new Promise(function(resolve){
      var ov = document.createElement('div');
      ov.style.cssText = 'position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;'+
        'background:rgba(3,8,18,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);animation:damsFade .15s ease';
      var danger = opts.danger !== false;
      var okColor = danger ? '#e5484d' : 'var(--accent)';
      var box = document.createElement('div');
      box.className = 'glass';
      box.style.cssText = 'width:min(92vw,380px);border-radius:18px;padding:22px;text-align:center;box-shadow:var(--shadow);animation:damsPop .18s ease';
      box.innerHTML =
        '<div style="font-size:34px;margin-bottom:6px">'+(opts.icon||(danger?'🗑️':'❓'))+'</div>'+
        '<div style="font-size:1rem;font-weight:600;margin-bottom:6px">'+(opts.title||'ຢືນຢັນ / Confirm')+'</div>'+
        '<div style="font-size:.86rem;color:var(--muted);margin-bottom:18px">'+message+'</div>'+
        '<div style="display:flex;gap:10px;justify-content:center">'+
          '<button id="_cCancel" style="padding:10px 20px;border-radius:11px;border:1px solid var(--line);'+
            'background:var(--bg2);color:var(--text);cursor:pointer;font-size:.86rem;font-weight:600">'+(opts.cancel||'ຍົກເລີກ / Cancel')+'</button>'+
          '<button id="_cOk" style="padding:10px 20px;border-radius:11px;border:none;color:#fff;cursor:pointer;'+
            'font-size:.86rem;font-weight:700;background:'+okColor+';box-shadow:0 0 18px '+okColor+'66">'+(opts.ok||(danger?'ລົບ / Delete':'ຕົກລົງ / OK'))+'</button>'+
        '</div>';
      ov.appendChild(box); document.body.appendChild(ov);
      function done(v){ ov.remove(); document.removeEventListener('keydown', onKey); resolve(v); }
      function onKey(e){ if(e.key==='Escape') done(false); if(e.key==='Enter') done(true); }
      document.addEventListener('keydown', onKey);
      ov.addEventListener('click', function(e){ if(e.target===ov) done(false); });
      box.querySelector('#_cCancel').onclick = function(){ done(false); };
      box.querySelector('#_cOk').onclick = function(){ done(true); };
      box.querySelector('#_cOk').focus();
    });
  },
  /* Drive file actions — id = drive_file_id. */
  fileView(id){ this.open('https://drive.google.com/file/d/'+id+'/view'); },
  fileDownload(id){ this.open('https://drive.google.com/uc?export=download&id='+id); },
  filePrint(id){ this.open('https://drive.google.com/file/d/'+id+'/view'); }, // preview → print
  /* Make link-shareable server-side, then Web-Share or show a share bar with platform links. */
  fileShare(id, title, anchorEl){
    var self = this;
    this.toast('ກຳລັງສ້າງລິ້ງແຊ… / preparing link…');
    this.call('apiShareLink', id).then(function(r){
      if(!r || !r.ok){ self.toast('⚠️ '+((r&&r.error&&r.error.code)||'Error'), true); return; }
      var url = r.data.share;
      if(navigator.share){
        navigator.share({ title: title||'PhotoShop DAMS', url: url }).catch(function(){ self._shareBar(url, title, anchorEl); });
      } else { self._shareBar(url, title, anchorEl); }
    }).catch(function(e){ self.toast('⚠️ '+e, true); });
  },
  _shareBar(url, title, anchorEl){
    var enc = encodeURIComponent(url), t = encodeURIComponent(title||'');
    var links = [
      ['Facebook','https://www.facebook.com/sharer/sharer.php?u='+enc],
      ['WhatsApp','https://wa.me/?text='+t+'%20'+enc],
      ['Line','https://social-plugins.line.me/lineit/share?url='+enc],
      ['Telegram','https://t.me/share/url?url='+enc+'&text='+t],
      ['Email','mailto:?subject='+t+'&body='+enc]
    ];
    var bar = document.createElement('div');
    bar.className = 'glass';
    bar.style.cssText = 'position:fixed;left:50%;bottom:70px;transform:translateX(-50%);z-index:9999;'+
      'padding:14px 16px;border-radius:14px;max-width:92vw;box-shadow:var(--shadow)';
    bar.innerHTML =
      '<div style="font-size:.8rem;color:var(--muted);margin-bottom:8px">ແຊລິ້ງ / Share link</div>'+
      '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">'+
        '<input readonly value="'+url+'" style="min-width:230px;font-size:.78rem" onclick="this.select()">'+
        '<button class="qa" style="width:auto;flex-direction:row;padding:7px 12px" id="_shCopy">📋 Copy</button>'+
        links.map(function(l){ return '<a class="qa" style="width:auto;flex-direction:row;padding:7px 12px;text-decoration:none" target="_blank" rel="noopener" href="'+l[1]+'">'+l[0]+'</a>'; }).join('')+
        '<button class="qa" style="width:auto;flex-direction:row;padding:7px 12px" id="_shClose">✕</button>'+
      '</div>';
    document.body.appendChild(bar);
    bar.querySelector('#_shClose').onclick = function(){ bar.remove(); };
    bar.querySelector('#_shCopy').onclick = function(){
      var i = bar.querySelector('input'); i.select();
      try{ document.execCommand('copy'); DAMS.toast('ຄັດລອກແລ້ວ / copied'); }catch(e){}
    };
  }
};

document.getElementById('themeBtn').onclick = function(){
  const h = document.documentElement, dark = h.getAttribute('data-theme') === 'dark';
  h.setAttribute('data-theme', dark ? 'light' : 'dark');
  this.textContent = dark ? '☀️' : '🌙';
};

/* Show a module view; dashboard uses its own sections, others render into #view. */
function showView(k){
  const dash = document.getElementById('dashView');
  const view = document.getElementById('view');
  if(k === 'dashboard'){ dash.style.display=''; view.style.display='none'; Dashboard.load(); return; }
  dash.style.display='none'; view.style.display='';
  if(k === 'customers'){ Customers.load(view); return; }
  if(k === 'photos'){ Photos.load(view); return; }
  if(k === 'albums'){ Albums.load(view); return; }
  if(k === 'orders'){ Orders.load(view); return; }
  if(k === 'payments'){ Payments.load(view); return; }
  if(k === 'documents'){ Documents.load(view); return; }
  if(k === 'printing'){ Printing.load(view); return; }
  if(k === 'search'){ Search.load(view); return; }
  if(k === 'reports'){ Reports.load(view); return; }
  if(k === 'settings'){ Settings.load(view); return; }
  if(k === 'design'){ Design.load(view); return; }
  document.getElementById('hSub').textContent = 'ໂມດູນນີ້ຢູ່ໃນແຜນ phase ຕໍ່ໄປ / coming soon.';
  view.innerHTML = '<div class="glass card">🚧 ' + k +
    ' — UI ກຳລັງພັດທະນາ. Backend service ພ້ອມ + tested ແລ້ວ.</div>';
}

document.getElementById('nav').addEventListener('click', function(e){
  const a = e.target.closest('a'); if(!a || !a.dataset.k) return;
  document.querySelectorAll('#nav a').forEach(x=>x.classList.remove('active'));
  a.classList.add('active');
  const en = (a.querySelector('.lbl b')||{}).textContent || a.textContent.trim();
  const lo = (a.querySelector('.lbl small')||{}).textContent || '';
  document.getElementById('hTitle').textContent = en + (lo ? ' / ' + lo : '');
  showView(a.dataset.k);
});
</script>

<script>
/* documentsView.html — Documents module: upload (versioned) + list. */
const Documents = (function(){
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  var TYPES = ['PDF','DOCX','XLSX','PPTX','PSD','AI','ZIP','PNG','JPEG','RAW','SVG'];
  function extType(name){ var m=String(name).toUpperCase().match(/\.([A-Z0-9]+)$/); var e=m?m[1]:''; if(e==='JPG')e='JPEG'; return TYPES.indexOf(e)>=0?e:'PDF'; }

  function load(el){
    document.getElementById('hSub').textContent = 'ຈັດການເອກະສານ / Documents';
    el.innerHTML =
      '<div class="glass card">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">' +
          '<h3 style="margin:0">ເອກະສານ / Documents</h3>' +
          '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">' +
            '<input type="file" id="dFile" style="max-width:230px;color:var(--muted);font-size:.82rem">' +
            '<button class="qa" id="dUp" style="width:auto;flex-direction:row;padding:9px 15px">⬆️ Upload / ອັບ</button>' +
            '<span id="dMsg" style="font-size:.8rem"></span>' +
          '</div>' +
        '</div><div id="dList" style="color:var(--muted)">ກຳລັງໂຫຼດ…</div></div>';
    document.getElementById('dUp').onclick = upload;
    refresh();
  }
  function refresh(){
    DAMS.call('apiDocuments').then(function(r){
      var list=document.getElementById('dList');
      if(!r||!r.ok){ list.innerHTML='<div style="color:#ff6b6b">⚠️ '+((r&&r.error&&r.error.code)||'Error')+'</div>'; return; }
      var rows=(r.data||[]).filter(function(d){return d.status!=='deleted';});
      if(!rows.length){ list.innerHTML='<div style="padding:14px">ຍັງບໍ່ມີເອກະສານ / No documents yet</div>'; return; }
      list.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:.86rem"><thead><tr style="text-align:left;color:var(--muted)">'+
        '<th style="padding:8px">ID</th><th>ຊື່</th><th>ປະເພດ</th><th>Ver</th><th>ວັນ</th></tr></thead><tbody>'+
        rows.map(function(d){ return '<tr style="border-top:1px solid var(--line)"><td style="padding:8px">'+esc(d.document_id)+'</td>'+
          '<td>'+esc(d.name)+'</td><td><span class="chip">'+esc(d.type)+'</span></td><td>v'+esc(d.version)+'</td>'+
          '<td style="color:var(--muted)">'+esc(String(d.created_at).slice(0,10))+'</td></tr>'; }).join('')+'</tbody></table>';
    });
  }
  function upload(){
    var inp=document.getElementById('dFile'); var file=inp.files&&inp.files[0]; var msg=document.getElementById('dMsg');
    if(!file){ msg.style.color='#ff6b6b'; msg.textContent='ເລືອກໄຟລ໌ກ່ອນ'; return; }
    msg.style.color='var(--muted)'; msg.textContent='ກຳລັງອັບ…';
    var reader=new FileReader();
    reader.onload=function(){
      var base64=String(reader.result).split(',')[1];
      DAMS.call('apiUploadDocument',{ name:file.name, type:extType(file.name), mimeType:file.type, dataBase64:base64 }).then(function(r){
        if(!r||!r.ok){ msg.style.color='#ff6b6b'; msg.textContent='⚠️ '+((r&&r.error&&r.error.code)||'Error'); return; }
        msg.style.color='var(--accent2)'; msg.textContent='✅ '+r.data.document_id+' v'+r.data.version;
        inp.value=''; refresh();
      });
    };
    reader.readAsDataURL(file);
  }
  return { load: load };
})();
</script>

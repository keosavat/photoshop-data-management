<script>
/* designView.html — embeds the PhotoShowcase module (hosted on GitHub Pages) as an iframe. */
const Design = (function(){
  var URL = 'https://keosavat.github.io/photo-showcase/';

  function load(el){
    var SRC = URL + '?v=' + Date.now(); // cache-buster: always load the latest build
    document.getElementById('hSub').textContent = 'ອອກແບບແມ່ແບບ / Design Studio';
    el.innerHTML =
      '<div class="glass card" style="padding:0;overflow:hidden">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;padding:12px 16px;border-bottom:1px solid var(--line)">' +
          '<h3 style="margin:0">🎨 Design Studio / ອອກແບບ</h3>' +
          '<a class="qa" style="width:auto;flex-direction:row;padding:7px 13px;text-decoration:none;font-size:.82rem" ' +
             'href="'+URL+'" target="_blank" rel="noopener">↗ ເປີດເຕັມຈໍ / Open full</a>' +
        '</div>' +
        '<iframe src="'+SRC+'" title="PhotoShowcase" ' +
          'style="width:100%;height:78vh;border:0;display:block;background:var(--bg)" ' +
          'allow="clipboard-write" referrerpolicy="no-referrer"></iframe>' +
      '</div>' +
      '<div style="font-size:.75rem;color:var(--muted);margin-top:8px">' +
        'ໂຕແກ້ໄຂ brand/ແມ່ແບບ (React) — host ຢູ່ GitHub Pages. ຖ້າຫວ່າງ ລໍຖ້າ build ~1-2 ນາທີ ຫຼື ກົດ "ເປີດເຕັມຈໍ".' +
      '</div>';
  }

  return { load: load };
})();
</script>

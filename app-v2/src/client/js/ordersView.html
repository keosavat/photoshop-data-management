<script>
/* ordersView.html — Orders module UI (list + create + advance status). */
const Orders = (function(){
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  var inp = 'flex:1;min-width:120px;padding:9px 11px;border-radius:8px;border:1px solid var(--line);background:var(--panel-solid);color:var(--text);font-family:var(--font)';
  var TRANS = { 'new':['in_progress','cancelled'], 'in_progress':['printing','cancelled'],
    'printing':['delivery','cancelled'], 'delivery':['complete','cancelled'], 'complete':[], 'cancelled':[] };
  function money(n){ return new Intl.NumberFormat('lo-LA').format(Number(n||0))+' ₭'; }

  function load(el){
    document.getElementById('hSub').textContent = 'ຈັດການອໍເດີ້ / Manage orders';
    el.innerHTML =
      '<div class="glass card">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">' +
          '<h3 style="margin:0">ອໍເດີ້ / Orders</h3>' +
          '<button class="qa" id="oAdd" style="width:auto;flex-direction:row;gap:6px;padding:9px 15px">➕ ໃໝ່ / New</button>' +
        '</div><div id="oForm" style="display:none"></div>' +
        '<div id="oList" style="color:var(--muted)">ກຳລັງໂຫຼດ…</div></div>';
    document.getElementById('oAdd').onclick = toggleForm;
    refresh();
  }
  function refresh(){
    DAMS.call('apiOrders').then(function(r){
      var list=document.getElementById('oList');
      if(!r||!r.ok){ list.innerHTML='<div style="color:#ff6b6b">⚠️ '+((r&&r.error&&r.error.code)||'Error')+'</div>'; return; }
      var rows=r.data||[];
      if(!rows.length){ list.innerHTML='<div style="padding:14px">ຍັງບໍ່ມີອໍເດີ້ / No orders yet</div>'; return; }
      list.innerHTML='<table style="width:100%;border-collapse:collapse;font-size:.86rem"><thead><tr style="text-align:left;color:var(--muted)">'+
        '<th style="padding:8px">ID</th><th>ລູກຄ້າ</th><th>ປະເພດ</th><th>ຍອດ</th><th>ສະຖານະ</th><th>ຈັດການ</th></tr></thead><tbody>'+
        rows.map(function(o){ var nexts=(TRANS[o.status]||[]).map(function(s){
            return '<button class="chip" data-id="'+esc(o.order_id)+'" data-next="'+s+'" style="cursor:pointer;margin-right:4px">→'+s+'</button>'; }).join('');
          return '<tr style="border-top:1px solid var(--line)"><td style="padding:8px">'+esc(o.order_id)+'</td>'+
            '<td>'+esc(o.customer_id)+'</td><td>'+esc(o.type)+'</td><td>'+money(o.total)+'</td>'+
            '<td><span class="chip">'+esc(o.status)+'</span></td><td>'+(nexts||'—')+'</td></tr>'; }).join('')+'</tbody></table>';
      Array.prototype.forEach.call(list.querySelectorAll('button[data-next]'), function(b){
        b.onclick=function(){ setStatus(b.getAttribute('data-id'), b.getAttribute('data-next')); }; });
    });
  }
  function setStatus(id,next){
    DAMS.call('apiSetOrderStatus', id, next).then(function(r){ refresh(); });
  }
  function toggleForm(){
    var f=document.getElementById('oForm');
    if(f.style.display==='none'){ f.style.display='';
      f.innerHTML='<div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;padding:14px;background:var(--bg2);border-radius:12px">'+
        '<input id="oCust" placeholder="Customer ID (CUS-...) *" style="'+inp+'">'+
        '<input id="oType" placeholder="ປະເພດ / Type * (wedding, id...)" style="'+inp+'">'+
        '<input id="oTotal" type="number" placeholder="ຍອດ / Total" style="'+inp+'">'+
        '<button class="qa" id="oSave" style="width:auto;flex-direction:row;padding:9px 16px">💾 Save</button>'+
        '<span id="oMsg" style="align-self:center;font-size:.8rem"></span></div>';
      document.getElementById('oSave').onclick=save;
    } else { f.style.display='none'; }
  }
  function save(){
    var msg=document.getElementById('oMsg'); msg.style.color='var(--muted)'; msg.textContent='…';
    DAMS.call('apiCreateOrder',{ customer_id:document.getElementById('oCust').value.trim(),
      type:document.getElementById('oType').value.trim(), total:Number(document.getElementById('oTotal').value||0) }).then(function(r){
      if(!r||!r.ok){ msg.style.color='#ff6b6b'; msg.textContent='⚠️ '+((r&&r.error&&r.error.code)||'Error'); return; }
      msg.style.color='var(--accent2)'; msg.textContent='✅ '+r.data.order_id;
      document.getElementById('oCust').value=''; document.getElementById('oType').value=''; document.getElementById('oTotal').value=''; refresh();
    });
  }
  return { load: load };
})();
</script>

<script>
/* photosView.html — Photos: upload (customer + date + file) + gallery with actions. */
const Photos = (function(){
  var customers = [];
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function today(){ return new Date().toISOString().slice(0,10); }

  function load(el){
    document.getElementById('hSub').textContent = 'ຄັງຮູບພາບ / Photo library';
    el.innerHTML =
      '<div class="glass card">' +
        '<h3 style="margin:0 0 12px">ອັບໂຫຼດຮູບ / Upload photo</h3>' +
        '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;align-items:end">' +
          '<label style="font-size:.78rem;color:var(--muted)">ລູກຄ້າ / Customer' +
            '<select id="pCus" style="width:100%;margin-top:4px"><option value="">— ບໍ່ລະບຸ / none —</option></select></label>' +
          '<label style="font-size:.78rem;color:var(--muted)">ວັນທີ / Date' +
            '<input type="date" id="pDate" style="width:100%;margin-top:4px" value="'+today()+'"></label>' +
          '<label style="font-size:.78rem;color:var(--muted)">ໄຟລ໌ຮູບ / Photo file' +
            '<input type="file" id="pFile" accept="image/*" style="width:100%;margin-top:4px;color:var(--muted);font-size:.8rem"></label>' +
          '<button class="btn-glow" id="pUp">⬆️ Upload / ອັບ</button>' +
        '</div>' +
        '<div id="pMsg" style="font-size:.8rem;margin-top:8px"></div>' +
      '</div>' +
      '<div class="glass card" style="margin-top:14px">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px">' +
          '<h3 style="margin:0">ຮູບພາບ / Photos</h3>' +
          '<input id="pSearch" placeholder="🔍 ຄົ້ນຫາ ຊື່/ລູກຄ້າ… / search" style="max-width:260px;font-size:.82rem">' +
        '</div>' +
        '<div id="pList" style="color:var(--muted)">ກຳລັງໂຫຼດ…</div>' +
      '</div>';
    document.getElementById('pUp').onclick = upload;
    document.getElementById('pSearch').oninput = render;
    DAMS.call('apiCustomers').then(function(r){
      customers = (r && r.ok) ? r.data : [];
      var sel = document.getElementById('pCus');
      customers.forEach(function(c){
        var o = document.createElement('option'); o.value = c.customer_id;
        o.textContent = c.customer_id + ' · ' + (c.name||'');
        sel.appendChild(o);
      });
    });
    refresh();
  }

  var rows = [];
  function refresh(){
    DAMS.call('apiPhotos').then(function(r){
      if(!r || !r.ok){ document.getElementById('pList').innerHTML = '<div style="color:#ff6b6b">⚠️ '+((r&&r.error&&r.error.code)||'Error')+'</div>'; return; }
      rows = (r.data || []).filter(function(p){ return p.status !== 'deleted'; });
      render();
    });
  }

  function render(){
    var q = (document.getElementById('pSearch').value||'').toLowerCase();
    var list = document.getElementById('pList');
    var items = rows.filter(function(p){
      if(!q) return true;
      return (String(p.name||'')+' '+String(p.customer_name||'')+' '+String(p.customer_id||'')).toLowerCase().indexOf(q) !== -1;
    });
    if(!items.length){ list.innerHTML = '<div style="padding:14px">ບໍ່ພົບຮູບ / No photos.</div>'; return; }
    var ph = "this.style.display='none';this.nextElementSibling.style.display='flex'";
    list.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">' +
      items.map(function(p){
        var thumb = p.thumb_url
          ? '<img loading="lazy" src="'+esc(p.thumb_url)+'" alt="'+esc(p.name)+'" onerror="'+ph+'" style="width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--bg)">'+
            '<div style="display:none;width:100%;aspect-ratio:1/1;align-items:center;justify-content:center;font-size:34px;background:var(--bg)">🖼️</div>'
          : '<div style="display:flex;width:100%;aspect-ratio:1/1;align-items:center;justify-content:center;font-size:34px;background:var(--bg)">🖼️</div>';
        var fid = esc(p.drive_file_id||'');
        var actions = '<div style="display:flex;gap:4px;margin-top:8px">' +
          btn('👁','ເບິ່ງ / View',"DAMS.fileView('"+fid+"')") +
          btn('🔗','ແຊ / Share',"DAMS.fileShare('"+fid+"')") +
          btn('🖨','ພິມ / Print',"DAMS.filePrint('"+fid+"')") +
          btn('⬇','ດາວໂຫຼດ / Download',"DAMS.fileDownload('"+fid+"')") +
          '<button class="btn-del" style="flex:1" title="ລົບ / Delete" onclick="__photoDel(\''+esc(p.photo_id)+'\')">🗑</button>' +
          '</div>';
        return '<div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;overflow:hidden">' +
          thumb +
          '<div style="padding:9px 11px">' +
            '<div style="font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</div>' +
            '<div style="font-size:.72rem;color:var(--muted)">'+esc(p.customer_name||p.customer_id||'—')+' · '+esc(p.photo_date||'')+'</div>' +
            actions +
          '</div></div>'; }).join('') +
      '</div>';
  }

  function btn(icon, title, onclick){
    return '<button title="'+title+'" onclick="'+onclick+'" style="flex:1;padding:6px 0;border:1px solid var(--line);'+
      'background:var(--bg);border-radius:8px;cursor:pointer;font-size:.9rem;color:var(--text)">'+icon+'</button>';
  }

  function del(id){
    DAMS.confirm('ລົບຮູບນີ້ອອກຈາກຄັງ? ຍັງກູ້ຄືນໄດ້ພາຍຫຼັງ.<br>Delete this photo? (recoverable)',
      { title:'ລົບຮູບ / Delete photo' }).then(function(okp){
      if(!okp) return;
      DAMS.call('apiDeletePhoto', id).then(function(r){
        if(!r || !r.ok){ DAMS.toast('⚠️ '+((r&&r.error&&r.error.code)||'Error'), true); return; }
        DAMS.toast('ລົບແລ້ວ / deleted'); refresh();
      }).catch(function(e){ DAMS.toast('⚠️ '+e, true); });
    });
  }
  window.__photoDel = del;

  function upload(){
    var inp = document.getElementById('pFile');
    var file = inp.files && inp.files[0];
    var msg = document.getElementById('pMsg');
    if(!file){ msg.style.color='#ff6b6b'; msg.textContent='ເລືອກໄຟລ໌ກ່ອນ / pick a file'; return; }
    var cusId = document.getElementById('pCus').value;
    var cusName = cusId ? (customers.filter(function(c){return c.customer_id===cusId;})[0]||{}).name || '' : '';
    var pdate = document.getElementById('pDate').value || today();
    msg.style.color='var(--muted)'; msg.textContent='ກຳລັງອັບ… / uploading…';
    var reader = new FileReader();
    reader.onload = function(){
      var base64 = String(reader.result).split(',')[1];
      DAMS.call('apiUploadPhoto', { name:file.name, mimeType:file.type, dataBase64:base64,
        customer_id:cusId, customer_name:cusName, photo_date:pdate }).then(function(r){
        if(!r || !r.ok){ msg.style.color='#ff6b6b'; msg.textContent='⚠️ '+((r&&r.error&&r.error.code)||'Error'); return; }
        msg.style.color='var(--accent2)';
        msg.textContent = (r.meta && r.meta.deduped) ? '↺ ຊ້ຳ (deduped)' : '✅ '+r.data.photo_id;
        inp.value=''; refresh();
      }).catch(function(e){ msg.style.color='#ff6b6b'; msg.textContent='⚠️ '+e; });
    };
    reader.readAsDataURL(file);
  }

  return { load: load };
})();
</script>

<script>
/* photosView.html — Photos module UI: real upload (base64) + gallery. */
const Photos = (function(){
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

  function load(el){
    document.getElementById('hSub').textContent = 'ຄັງຮູບພາບ / Photo library';
    el.innerHTML =
      '<div class="glass card">' +
        '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px">' +
          '<h3 style="margin:0">ຮູບພາບ / Photos</h3>' +
          '<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">' +
            '<input type="file" id="pFile" accept="image/*" style="max-width:230px;color:var(--muted);font-size:.82rem">' +
            '<button class="qa" id="pUp" style="width:auto;flex-direction:row;padding:9px 15px">⬆️ Upload / ອັບ</button>' +
            '<span id="pMsg" style="font-size:.8rem"></span>' +
          '</div>' +
        '</div>' +
        '<div id="pList" style="color:var(--muted)">ກຳລັງໂຫຼດ…</div>' +
      '</div>';
    document.getElementById('pUp').onclick = upload;
    refresh();
  }

  function refresh(){
    DAMS.call('apiPhotos').then(function(r){
      const list = document.getElementById('pList');
      if(!r || !r.ok){ list.innerHTML = '<div style="color:#ff6b6b">⚠️ '+((r&&r.error&&r.error.code)||'Error')+'</div>'; return; }
      const rows = (r.data || []).filter(function(p){ return p.status !== 'deleted'; });
      if(!rows.length){ list.innerHTML = '<div style="padding:14px">ຍັງບໍ່ມີຮູບ / No photos yet — ເລືອກໄຟລ໌ແລ້ວກົດ Upload.</div>'; return; }
      var ph = "this.style.display='none';this.nextElementSibling.style.display='flex'";
      list.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px">' +
        rows.map(function(p){
          var thumb = p.thumb_url
            ? '<img loading="lazy" src="'+esc(p.thumb_url)+'" alt="'+esc(p.name)+'" onerror="'+ph+'" ' +
                'style="width:100%;aspect-ratio:1/1;object-fit:cover;display:block;background:var(--bg)">' +
              '<div style="display:none;width:100%;aspect-ratio:1/1;align-items:center;justify-content:center;font-size:34px;background:var(--bg)">🖼️</div>'
            : '<div style="display:flex;width:100%;aspect-ratio:1/1;align-items:center;justify-content:center;font-size:34px;background:var(--bg)">🖼️</div>';
          return '<div style="background:var(--bg2);border:1px solid var(--line);border-radius:12px;overflow:hidden">' +
            thumb +
            '<div style="padding:9px 11px">' +
              '<div style="font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(p.name)+'</div>' +
              '<div style="font-size:.72rem;color:var(--muted)">'+esc(p.album_id||'—')+' · '+esc(p.status)+'</div>' +
            '</div></div>'; }).join('') +
        '</div>';
    });
  }

  function upload(){
    const inp = document.getElementById('pFile');
    const file = inp.files && inp.files[0];
    const msg = document.getElementById('pMsg');
    if(!file){ msg.style.color='#ff6b6b'; msg.textContent='ເລືອກໄຟລ໌ກ່ອນ / pick a file'; return; }
    msg.style.color='var(--muted)'; msg.textContent='ກຳລັງອັບ… / uploading…';
    const reader = new FileReader();
    reader.onload = function(){
      const base64 = String(reader.result).split(',')[1];
      DAMS.call('apiUploadPhoto', { name:file.name, mimeType:file.type, dataBase64:base64 }).then(function(r){
        if(!r || !r.ok){ msg.style.color='#ff6b6b'; msg.textContent='⚠️ '+((r&&r.error&&r.error.code)||'Error'); return; }
        msg.style.color='var(--accent2)';
        msg.textContent = (r.meta && r.meta.deduped) ? '↺ ຊ້ຳ (deduped)' : '✅ '+r.data.photo_id;
        inp.value=''; refresh();
      }).catch(function(e){ msg.style.color='#ff6b6b'; msg.textContent='⚠️ '+e; });
    };
    reader.readAsDataURL(file);
  }

  return { load: load };
})();
</script>
